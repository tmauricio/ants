# Reusable workflow — called by each module's release workflow
# Builds the Tauri app on Windows, Linux and macOS, then publishes a GitHub Release.

name: _release-build

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
        description: "Module name (e.g. music, tasks, shell)"
      module_path:
        required: true
        type: string
        description: "Path from repo root to the module (e.g. modules/music)"
      tag:
        required: true
        type: string
        description: "Full git tag that triggered this run (e.g. music/v1.2.0)"
      product_name:
        required: true
        type: string
        description: "Tauri productName (e.g. Music, Tasks)"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──────────────────────────────────────────────────────
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            rust_toolchain_targets: x86_64-pc-windows-msvc
            os_label: windows

          # ── Linux ────────────────────────────────────────────────────────
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            rust_toolchain_targets: x86_64-unknown-linux-gnu
            os_label: linux

          # ── macOS universal (Intel + Apple Silicon) ───────────────────────
          # rustup doesn't have a "universal-apple-darwin" target — install both
          # real targets; tauri-build handles lipo to merge them.
          - platform: macos-latest
            rust_target: universal-apple-darwin
            rust_toolchain_targets: aarch64-apple-darwin,x86_64-apple-darwin
            os_label: macos

    runs-on: ${{ matrix.platform }}
    name: Build · ${{ matrix.os_label }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── System deps (Linux only) ──────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_toolchain_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.module_path }}/src-tauri -> target

      # ── Node + pnpm ───────────────────────────────────────────────────────
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: ${{ inputs.module_path }}
        run: pnpm install

      # ── Build & Release ───────────────────────────────────────────────────
      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ${{ inputs.module_path }}
          tagName: ${{ inputs.tag }}
          releaseName: "${{ inputs.product_name }} ${{ inputs.tag }}"
          releaseBody: |
            ## ${{ inputs.product_name }} — ${{ inputs.tag }}

            ### Download
            | Platform | File |
            |----------|------|
            | Windows  | `.msi` or `-setup.exe` |
            | Linux    | `.AppImage` or `.deb` |
            | macOS    | `.dmg` |

            ### Changelog
            _See commit history for details._
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust_target }}
