# Reusable workflow — called by each module's release workflow.
# Stage 1: create the draft GitHub Release (single job).
# Stage 2: build on Windows / Linux / macOS in parallel and upload artifacts.

name: _release-build

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
      module_path:
        required: true
        type: string
      tag:
        required: true
        type: string
      product_name:
        required: true
        type: string

jobs:

  # ── 1. Create the draft release once ──────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create draft GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag  = '${{ inputs.tag }}';
            const name = '${{ inputs.product_name }} ' + tag;
            const body = [
              '## ${{ inputs.product_name }} — ' + tag,
              '',
              '### Download',
              '| Platform | File |',
              '|----------|------|',
              '| Windows  | `.msi` installer or `-setup.exe` |',
              '| Linux    | `.AppImage`, `.deb` or `.rpm` |',
              '| macOS    | `.dmg` (universal: Intel + Apple Silicon) |',
              '',
              '### Changelog',
              '_See commit history for details._',
            ].join('\n');

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name:   tag,
              name,
              body,
              draft:      true,
              prerelease: false,
            });
            return data.id;

  # ── 2. Build on each platform and upload to the draft release ─────────────
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            rust_toolchain_targets: x86_64-pc-windows-msvc
            os_label: windows

          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            rust_toolchain_targets: x86_64-unknown-linux-gnu
            os_label: linux

          # rustup doesn't have "universal-apple-darwin" — install both real
          # targets; tauri-build uses lipo to combine them.
          - platform: macos-latest
            rust_target: universal-apple-darwin
            rust_toolchain_targets: aarch64-apple-darwin,x86_64-apple-darwin
            os_label: macos

    runs-on: ${{ matrix.platform }}
    name: Build · ${{ matrix.os_label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux system deps ──────────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      # ── Override local dev Rust config (Windows GNU → plain stable for CI) ─
      - name: Reset rust-toolchain.toml and cargo config for CI
        shell: bash
        run: |
          printf '[toolchain]\nchannel = "stable"\n' \
            > ${{ inputs.module_path }}/rust-toolchain.toml
          printf '[build]\n' \
            > ${{ inputs.module_path }}/.cargo/config.toml

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_toolchain_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.module_path }}/src-tauri -> target

      # ── Node + pnpm ────────────────────────────────────────────────────────
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: ${{ inputs.module_path }}
        run: pnpm install

      # ── Build & upload artifacts to the pre-created draft release ──────────
      - name: Build Tauri app and upload artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ${{ inputs.module_path }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.rust_target }}
