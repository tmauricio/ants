name: Release · Notes

on:
  push:
    tags:
      - 'notes/v*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_release-build.yml
    with:
      module: notes
      module_path: modules/notes
      tag: ${{ github.ref_name }}
      product_name: Notes
    secrets: inherit
